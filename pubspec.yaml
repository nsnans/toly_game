name: toly_game
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'


dependencies:
  flutter:
    sdk: flutter
#  flame: ^1.16.0
  flame: ^1.17.0
  flame_audio: ^2.10.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.2
  flame_svg: ^1.10.1
  flame_forge2d: ^0.16.0+5
  flutter_svg: ^2.0.10+1
  window_manager: ^0.3.8      # 桌面管理
#  web: ^0.5.1
  flame_ext:
    path: packages/flame_ext
  life_game:
    path: modules/life_game

  # 国际化
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  oktoast: ^3.4.0
  tolyui: ^0.0.2+15
  url_launcher: ^6.2.5 # url 跳转

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/demos/
    - assets/images/trex/
    - assets/images/break_bricks/
    - assets/images/sweeper/
    - assets/images/break_bricks/boom/
    - assets/images/break_bricks/bottom/
    - assets/images/break_bricks/died/
    - assets/audio/
    - assets/audio/break_bricks/
    - assets/audio/ui/
    - assets/data/
  fonts:
    - family: 'JetBrainsMono'
      fonts:
        - asset: 'assets/fonts/JetBrainsMono-VariableFont_wght.ttf'

#flutter_gen:
#  output: lib/base_course/23/gen # 代码生成的路径位置
